<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Writing Page</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e5e5e5;
    overflow: hidden;
  }

  .toolbar {
    width: 100%;
    background: #fff;
    padding: 10px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    position: relative;
    z-index: 5;
  }

  .page-wrapper {
    width: 100%;
    height: calc(100vh - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .page {
    width: 794px;
    height: 1123px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    padding: 80px;
    position: relative;
    overflow: hidden;
    font-size: 16px;
    line-height: 1.5;
  }

  .box {
    position: absolute;
    min-width: 120px;
    min-height: 40px;
    padding: 6px;
    border: 1px dashed #aaa;
    cursor: move;
    background: white;
    user-select: none;
  }

  .box.selected {
    outline: 2px solid #4a90e2;
  }

  .box-toolbar {
    position: absolute;
    top: -28px;
    right: 0;
    display: none;
    gap: 5px;
  }

  .box:hover .box-toolbar {
    display: flex;
  }

  button { font-size: 12px; cursor: pointer; }

  .footer {
    padding: 10px;
    font-size: 14px;
    background: #fff;
    width: 100%;
    text-align: center;
  }
</style>
</head>
<body>

<div class="toolbar">
  <select id="mode">
    <option value="essay">Essay Mode</option>
    <option value="free">Free Form Mode</option>
  </select>

  <label>Size
    <input type="range" id="sizeSlider" min="12" max="40" value="16">
  </label>

  <button onclick="toggleBold()">Bold</button>
</div>

<div class="page-wrapper">
  <div id="page" class="page"></div>
</div>

<div class="footer">
  Word Count: <span id="wordCount">0</span>
</div>

<script>
const page = document.getElementById("page");
const mode = document.getElementById("mode");
const sizeSlider = document.getElementById("sizeSlider");
const wordCountEl = document.getElementById("wordCount");

let selectedBox = null;
let scale = 1;

function updateWordCount() {
  wordCountEl.innerText = page.innerText.trim().split(/\s+/).filter(Boolean).length;
}

function selectBox(box) {
  document.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
  selectedBox = box;
  if (box) box.classList.add('selected');
}

mode.addEventListener("change", () => {
  page.innerHTML = "";
  if (mode.value === "free") {
    addBox("Header");
  } else {
    page.contentEditable = true;
  }
});

function addBox(type) {
  const box = document.createElement("div");
  box.className = "box";
  box.contentEditable = true;
  box.innerText = type;

  if (type === "Header") box.style.fontSize = "28px";
  else box.style.fontSize = "16px";

  box.style.left = "100px";
  box.style.top = "100px";

  box.addEventListener("mousedown", (e) => {
    selectBox(box);
  });

  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  box.addEventListener("mousedown", (e) => {
    dragging = true;
    const rect = box.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging || selectedBox !== box) return;
    const rect = page.getBoundingClientRect();
    box.style.left = (e.clientX - rect.left - offsetX) + "px";
    box.style.top = (e.clientY - rect.top - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => dragging = false);

  page.appendChild(box);
  selectBox(box);
}

sizeSlider.addEventListener("input", () => {
  if (selectedBox) selectedBox.style.fontSize = sizeSlider.value + "px";
  else page.style.fontSize = sizeSlider.value + "px";
});

function toggleBold() {
  if (selectedBox) {
    selectedBox.style.fontWeight = selectedBox.style.fontWeight === "bold" ? "normal" : "bold";
  }
}

// arrow key movement
document.addEventListener("keydown", (e) => {
  if (!selectedBox) return;
  const step = 5;
  let left = parseInt(selectedBox.style.left || 0);
  let top = parseInt(selectedBox.style.top || 0);

  if (e.key === "ArrowLeft") selectedBox.style.left = (left - step) + "px";
  if (e.key === "ArrowRight") selectedBox.style.left = (left + step) + "px";
  if (e.key === "ArrowUp") selectedBox.style.top = (top - step) + "px";
  if (e.key === "ArrowDown") selectedBox.style.top = (top + step) + "px";
});

page.addEventListener("input", updateWordCount);
updateWordCount();
</script>

</body>
</html>
