<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Writing Page</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e5e5e5;
    overflow: hidden;
  }

  .toolbar {
    width: 100%;
    background: #fff;
    padding: 10px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    align-items: center;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .page-wrapper {
    width: 100%;
    height: calc(100vh - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .page {
    width: 794px;
    height: 1123px;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    padding: 80px;
    position: relative;
    overflow: hidden;
  }

  .free-toolbox {
    position: absolute;
    left: 10px;
    top: 10px;
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    display: none;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  .box {
    position: absolute;
    min-width: 120px;
    min-height: 40px;
    padding: 6px;
    border: 1px dashed #aaa;
    cursor: move;
    background: transparent;
  }

  .box[contenteditable="true"]:focus {
    outline: 2px solid #4a90e2;
    cursor: text;
  }

  .box-toolbar {
    position: absolute;
    top: -28px;
    right: 0;
    display: none;
    gap: 5px;
  }

  .box:hover .box-toolbar {
    display: flex;
  }

  button {
    font-size: 12px;
    cursor: pointer;
  }

  .footer {
    padding: 10px;
    font-size: 14px;
    background: #fff;
    width: 100%;
    text-align: center;
    box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
  }

</style>
</head>
<body>

<div class="toolbar">
  <div class="toggle">
    Mode:
    <select id="mode">
      <option value="essay">Essay</option>
      <option value="free">Free Form</option>
    </select>
  </div>

  <label>Font Size:
    <input type="range" id="fontSize" min="12" max="36" value="16">
  </label>

  <label>Line Spacing:
    <input type="range" id="lineSpacing" min="1" max="2.5" step="0.1" value="1.5">
  </label>

  <label>Margins:
    <input type="range" id="marginSize" min="20" max="120" value="80">
  </label>

  <button onclick="toggleBold()">Bold</button>
</div>

<div class="page-wrapper">
  <div class="page" id="page" contenteditable="true">
    Start typing your essay here...
  </div>

  <div class="free-toolbox" id="toolbox">
    <button onclick="addBox('Header')">Header</button>
    <button onclick="addBox('Paragraph')">Paragraph</button>
  </div>
</div>

<div class="footer">
  Word Count: <span id="wordCount">0</span>
</div>

<script>
const page = document.getElementById("page");
const mode = document.getElementById("mode");
const toolbox = document.getElementById("toolbox");
const fontSize = document.getElementById("fontSize");
const lineSpacing = document.getElementById("lineSpacing");
const marginSize = document.getElementById("marginSize");
const wordCountEl = document.getElementById("wordCount");

function updateWordCount() {
  const text = page.innerText.trim();
  const words = text.length ? text.split(/\s+/) : [];
  wordCountEl.innerText = words.filter(w => w.length > 0).length;
}

fontSize.addEventListener("input", () => {
  page.style.fontSize = fontSize.value + "px";
});

lineSpacing.addEventListener("input", () => {
  page.style.lineHeight = lineSpacing.value;
});

marginSize.addEventListener("input", () => {
  page.style.padding = marginSize.value + "px";
});

mode.addEventListener("change", () => {
  if (mode.value === "free") {
    page.contentEditable = false;
    toolbox.style.display = "flex";
  } else {
    page.contentEditable = true;
    toolbox.style.display = "none";
  }
});

function addBox(type) {
  const box = document.createElement("div");
  box.className = "box";
  box.contentEditable = true;
  box.innerText = type + " text";
  box.style.left = "100px";
  box.style.top = "100px";

  const toolbar = document.createElement("div");
  toolbar.className = "box-toolbar";

  const boldBtn = document.createElement("button");
  boldBtn.innerText = "B";
  boldBtn.onclick = () => {
    document.execCommand("bold");
  };

  toolbar.appendChild(boldBtn);
  box.appendChild(toolbar);

  makeDraggable(box);
  page.appendChild(box);
}

function makeDraggable(el) {
  let offsetX, offsetY, dragging = false;

  el.addEventListener("mousedown", (e) => {
    if (e.target.tagName === "BUTTON" || el.isContentEditable) return;
    dragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = page.getBoundingClientRect();
    el.style.left = (e.clientX - rect.left - offsetX) + "px";
    el.style.top = (e.clientY - rect.top - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => dragging = false);
}

function toggleBold() {
  document.execCommand("bold");
}

page.addEventListener("input", updateWordCount);

updateWordCount();
</script>

</body>
</html>
